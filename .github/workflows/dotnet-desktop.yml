name: Build ClipPlusPlus

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # 可选：如果未来加了测试项目再启用
    # - name: Run tests
    #   run: dotnet test

    - name: Publish self-contained single-file executable
      run: |
        dotnet publish ClipPlusPlus.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          /p:PublishSingleFile=true `
          /p:IncludeNativeLibrariesForSelfExtract=true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClipPlusPlus-win-x64
        path: bin/Release/net10.0/win-x64/publish/
