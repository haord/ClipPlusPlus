name: Build Clip++

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  APP_NAME: ClipPlusPlus
  PUBLISH_DIR: ./publish

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Debug
        run: dotnet build --configuration Debug --no-restore

      - name: Build Release
        run: dotnet build --configuration Release --no-restore

      - name: Publish Single File (Self-Contained)
        run: |
          dotnet publish --configuration Release `
            --output ${{ env.PUBLISH_DIR }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -r win-x64

      - name: Upload Single File Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-SingleFile
          path: ${{ env.PUBLISH_DIR }}/*.exe

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish Single File (Self-Contained)
        run: |
          dotnet publish --configuration Release `
            --output ${{ env.PUBLISH_DIR }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -r win-x64

      - name: Rename Executable with Version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $version = $version -replace '^v', ''
          $src = "${{ env.PUBLISH_DIR }}\${{ env.APP_NAME }}.exe"
          $dst = "${{ env.PUBLISH_DIR }}\${{ env.APP_NAME }}-$version.exe"
          if (Test-Path $src) {
            Rename-Item -Path $src -NewName $dst
          } else {
            Get-ChildItem ${{ env.PUBLISH_DIR }} -Filter *.exe | Select-Object -First 1 | Rename-Item -NewName $dst
          }
          echo "OUTPUT_FILE=$dst" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.PUBLISH_DIR }}/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
